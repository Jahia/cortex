name: Release

# Turn a `v*` tag into a GitHub Release with packed artifacts + checksums.
# The tag must match marketplace.build.tagPattern ("v{version}") so the
# --check-versions gate agrees with apm.yml.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install APM CLI
        # Official install script (https://microsoft.github.io/apm/), pinned.
        run: |
          curl -sSL https://aka.ms/apm-unix | APM_INSTALL_DIR="$HOME/.local/bin" sh -s -- @v0.21.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify APM CLI
        run: apm --version

      - name: Pack (with release gates)
        run: apm pack --check-versions --check-clean --archive --output ./build

      - name: Generate checksums
        run: |
          cd build
          for f in *.zip; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -l

      - name: Create or update GitHub Release
        # Idempotent: a tag push normally creates the release here, but if the
        # release/tag was created another way first (e.g. via the GitHub UI, which
        # creates the tag and triggers this workflow), the release already exists —
        # so upload the artifacts instead of failing. Also makes re-runs safe.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading artifacts (clobber)."
            gh release upload "$GITHUB_REF_NAME" build/*.zip build/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              build/*.zip build/*.sha256 \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
