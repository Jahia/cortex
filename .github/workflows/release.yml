name: Release

# Cut a release from the GitHub UI — the version is kept in sync automatically.
#
# To release:  GitHub → Releases → "Draft a new release" → new tag `vX.Y.Z`
#              (target: main) → Publish.
#
# This workflow authenticates as **jahia-ci over SSH** (org secret
# GH_SSH_PRIVATE_KEY_JAHIACI) and, on a `v*` tag:
#   1. derives the version from the tag (`v0.2.1` → `0.2.1`),
#   2. if apm.yml doesn't already match: bumps both lockstep version fields +
#      regenerates .claude-plugin/marketplace.json, commits to `main` and pushes,
#      then force-moves the tag onto that bump commit — consumers install
#      `Jahia/cortex#vX.Y.Z` and read apm.yml from the repo tree at the tag, so the
#      version must live on the tagged commit,
#   3. packs and uploads the artifacts (+ checksums) to the release.
# Re-running is safe (idempotent): if apm.yml already matches, it just rebuilds
# and re-uploads (no commit, no tag move) — this is also the path taken by the
# extra run that the tag force-move itself triggers.
#
# Prerequisites (one-time):
#   - Org secret GH_SSH_PRIVATE_KEY_JAHIACI visible to this repo; jahia-ci has
#     write access to cortex.
#   - jahia-ci is a *bypass actor* on the tag-protection ruleset (tags are
#     otherwise immutable, so the force-move would be rejected). Add it to the
#     branch ruleset bypass list too once `main` is protected.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # gh release create/upload via GITHUB_TOKEN

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout main (as jahia-ci over SSH)
        uses: actions/checkout@v7
        with:
          ref: main
          ssh-key: ${{ secrets.GH_SSH_PRIVATE_KEY_JAHIACI }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "jahia-ci"
          git config user.email "jahia-ci@jahia.com"

      - name: Install APM CLI
        # Official install script (https://microsoft.github.io/apm/), pinned.
        run: |
          curl -sSL https://aka.ms/apm-unix | APM_INSTALL_DIR="$HOME/.local/bin" sh -s -- @v0.21.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify APM CLI
        run: apm --version

      - name: Resolve version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT="$(grep -E '^version:' apm.yml | head -1 | sed -E 's/^version:[[:space:]]*//; s/["'\'' ]//g')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Tag version: '$VERSION' (apm.yml currently: '$CURRENT')"

      - name: Bump version, commit to main, move tag
        if: steps.ver.outputs.version != steps.ver.outputs.current
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Both lockstep version fields: top-level (col 0) and the package (indented).
          sed -i -E "s/^version:[[:space:]].*/version: ${VERSION}/" apm.yml
          sed -i -E "s/^([[:space:]]+)version:[[:space:]].*/\1version: ${VERSION}/" apm.yml
          # Regenerate marketplace.json + build the artifact from the bumped tree.
          apm pack --check-versions --archive --output ./build
          git add apm.yml .claude-plugin/marketplace.json
          git commit -m "chore(release): bump version to ${VERSION}"
          git push origin HEAD:main
          # Force-move the (policy-immutable) tag onto the bump commit. Requires
          # jahia-ci to be a bypass actor on the tag ruleset.
          git tag -f "${GITHUB_REF_NAME}" HEAD
          git push --force origin "refs/tags/${GITHUB_REF_NAME}"

      - name: Pack (version already aligned — re-run)
        if: steps.ver.outputs.version == steps.ver.outputs.current
        run: apm pack --check-versions --check-clean --archive --output ./build

      - name: Generate checksums
        run: |
          cd build
          for f in *.zip; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -l

      - name: Upload artifacts to the release
        # Idempotent: the UI already created the release; upload (clobber) into it.
        # The create branch covers tag pushes that arrive without a release object.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME exists — uploading artifacts (clobber)."
            gh release upload "$GITHUB_REF_NAME" build/*.zip build/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              build/*.zip build/*.sha256 \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
